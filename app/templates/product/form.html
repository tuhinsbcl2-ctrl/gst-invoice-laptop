{% extends 'base.html' %}
{% block title %}{{ 'Edit' if edit_mode else 'Add' }} Product{% endblock %}
{% block content %}
<div class="row mb-3 align-items-center">
    <div class="col"><h4><i class="bi bi-box-seam me-2"></i>{{ 'Edit' if edit_mode else 'Add' }} Product</h4></div>
    <div class="col-auto">
        <a href="{{ url_for('product.list_products') }}" class="btn btn-outline-secondary btn-sm">Back</a>
    </div>
</div>
<div class="card" style="max-width:650px;">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Catalog No</label>
                    <input type="text" name="catalog_no" class="form-control"
                           value="{{ product.catalog_no if edit_mode else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Product Name <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" required
                           value="{{ product.name if edit_mode else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">HSN Code</label>
                    <input type="text" name="hsn_code" class="form-control"
                           value="{{ product.hsn_code if edit_mode else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">GST Rate (%)</label>
                    <select name="default_gst_rate" class="form-select">
                        {% for rate in [0, 5, 12, 18, 28] %}
                        <option value="{{ rate }}" {% if edit_mode and product.default_gst_rate == rate %}selected{% elif not edit_mode and rate == 5 %}selected{% endif %}>{{ rate }}%</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Default Unit Price (₹)</label>
                    <input type="number" name="default_unit_price" class="form-control" step="0.01"
                           value="{{ product.default_unit_price if edit_mode else 0 }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Unit</label>
                    <select name="unit" class="form-select">
                        {% for u in ['Pcs', 'Nos', 'Kg', 'Ltr', 'Box', 'Set', 'Pair'] %}
                        <option value="{{ u }}" {% if edit_mode and product.unit == u %}selected{% endif %}>{{ u }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Stock Quantity</label>
                    <input type="number" name="stock_quantity" class="form-control" step="0.01"
                           value="{{ product.stock_quantity if edit_mode else 0 }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Low Stock Threshold</label>
                    <input type="number" name="low_stock_threshold" class="form-control" step="0.01"
                           value="{{ product.low_stock_threshold if edit_mode else 10 }}">
                </div>
                <div class="col-12 text-end">
                    <a href="{{ url_for('product.list_products') }}" class="btn btn-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary">{{ 'Update' if edit_mode else 'Save' }} Product</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
