{% extends 'base.html' %}
{% block title %}{{ 'Edit' if edit_mode else 'Add' }} Expense{% endblock %}
{% block content %}
<div class="row mb-3 align-items-center">
    <div class="col"><h4><i class="bi bi-wallet2 me-2"></i>{{ 'Edit' if edit_mode else 'Add' }} Expense</h4></div>
    <div class="col-auto"><a href="{{ url_for('expense.list_expenses') }}" class="btn btn-outline-secondary btn-sm">Back</a></div>
</div>
<div class="card" style="max-width:600px;">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Date</label>
                    <input type="date" name="date" class="form-control" required
                           value="{{ expense.date.strftime('%Y-%m-%d') if edit_mode and expense.date else today }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Amount (₹)</label>
                    <input type="number" name="amount" class="form-control" step="0.01" required
                           value="{{ expense.amount if edit_mode else '' }}">
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold">Description</label>
                    <input type="text" name="description" class="form-control"
                           value="{{ expense.description if edit_mode else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Mode</label>
                    <select name="mode" class="form-select">
                        <option value="Cash" {% if edit_mode and expense.mode == 'Cash' %}selected{% endif %}>Cash</option>
                        <option value="Bank" {% if not edit_mode or expense.mode == 'Bank' %}selected{% endif %}>Bank</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Bank Name</label>
                    <input type="text" name="bank_name" class="form-control"
                           value="{{ expense.bank_name if edit_mode else '' }}">
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold">Category</label>
                    <input type="text" name="category" class="form-control" list="catList"
                           value="{{ expense.category if edit_mode else '' }}" placeholder="e.g. Transport, Office, etc.">
                    <datalist id="catList">
                        <option value="Transport">
                        <option value="Office">
                        <option value="Utilities">
                        <option value="Salary">
                        <option value="Purchase">
                        <option value="Miscellaneous">
                    </datalist>
                </div>
                <div class="col-12 text-end">
                    <a href="{{ url_for('expense.list_expenses') }}" class="btn btn-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary">{{ 'Update' if edit_mode else 'Save' }} Expense</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
